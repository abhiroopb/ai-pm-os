jobs:
  # ── Daily ────────────────────────────────────────────────────
  #
  # NOTE: inbox, chat, todo, issue-tracker, and code-review triage are
  # handled by dedicated routines and are NOT listed here to avoid duplicate runs.
  #
  # Owner: routines/scheduled-jobs/ runs these via its CONTEXT.md.
  #
  - name: project-field-audit
    command: |
      Review the projects you own in your planning system.
      Cross-reference project tracker fields against issue tracker statuses,
      recent communication activity, and recent meetings. Flag mismatches:
      - Tracker says "On Track" but issue tracker has blocked tickets
      - Tracker dates are in the past
      - Status hasn't been updated in 7+ days
      Propose specific field corrections. Ask before making changes.
    schedule: daily
    confirm: false

  # ── Weekly ─────────────────────────────────────────────────
  #
  - name: feature-request-scan
    command: |
      Review your product feedback sources for the last week.
      Classify incoming feature requests, score urgency, deduplicate against the
      backlog, and draft a short summary of what needs follow-up.
    schedule: weekly-monday
    confirm: false

  - name: project-status-update
    command: |
      For each active project, pull from the issue tracker, recent communications,
      and recent meetings to draft this
      week's status update. Present each draft for approval before posting.
    schedule: weekly-thursday
    confirm: false

  - name: weekly-status-summary
    command: |
      Generate a consolidated weekly status summary from project updates.
      Draft it for the team channel, weekly note, or whichever destination you use.
    schedule: weekly-friday
    confirm: false

  - name: manager-summary
    command: |
      Generate a weekly summary for your manager or primary stakeholder.
      Pull recent decisions, open risks, and asks into your 1:1 notes or preferred briefing doc.
    schedule: weekly-friday
    confirm: false

  - name: kb-distill
    command: |
      Review accumulated notes and observations.
      Distill anything repetitive into a cleaner knowledge note or operating rule proposal.
      Present proposed changes for approval before applying them.
    schedule: weekly-sunday
    confirm: false
